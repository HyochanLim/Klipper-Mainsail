# CMYKW channel-axis sample
#
# OrcaSlicer emits these reserved axes:
#   A=Cyan, B=Magenta, C=Yellow, D=Black, H=White
#
# The physical filament tubes must be loaded in that order. Do not reuse
# A/B/C/D/H for another MANUAL_STEPPER GCODE_AXIS mapping in this fork.
#
# OrcaSlicer's machine start G-code should call START_PRINT. Keep the actual
# channel-axis registration in Klipper because it depends on the printer wiring.

[extruder]
# Keep this section for the nozzle heater, thermistor, and Klipper's logical E
# checks. In this channel-axis setup the physical filament motors are the
# manual_steppers below, so do not put step_pin/dir_pin/enable_pin here.
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA0
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA1
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 260
max_extrude_only_distance: 200

[manual_stepper c_motor]
step_pin: PB0
dir_pin: PB1
enable_pin: !PB2
microsteps: 16
rotation_distance: 33.500
velocity: 25
accel: 500

[manual_stepper m_motor]
step_pin: PB3
dir_pin: PB4
enable_pin: !PB5
microsteps: 16
rotation_distance: 33.500
velocity: 25
accel: 500

[manual_stepper y_motor]
step_pin: PB6
dir_pin: PB7
enable_pin: !PB8
microsteps: 16
rotation_distance: 33.500
velocity: 25
accel: 500

[manual_stepper k_motor]
step_pin: PB9
dir_pin: PB10
enable_pin: !PB11
microsteps: 16
rotation_distance: 33.500
velocity: 25
accel: 500

[manual_stepper w_motor]
step_pin: PB12
dir_pin: PB13
enable_pin: !PB14
microsteps: 16
rotation_distance: 33.500
velocity: 25
accel: 500

[gcode_macro REGISTER_CMYKW_AXES]
gcode:
  MANUAL_STEPPER STEPPER=c_motor SET_POSITION=0
  MANUAL_STEPPER STEPPER=m_motor SET_POSITION=0
  MANUAL_STEPPER STEPPER=y_motor SET_POSITION=0
  MANUAL_STEPPER STEPPER=k_motor SET_POSITION=0
  MANUAL_STEPPER STEPPER=w_motor SET_POSITION=0
  MANUAL_STEPPER STEPPER=c_motor GCODE_AXIS=A
  MANUAL_STEPPER STEPPER=m_motor GCODE_AXIS=B
  MANUAL_STEPPER STEPPER=y_motor GCODE_AXIS=C
  MANUAL_STEPPER STEPPER=k_motor GCODE_AXIS=D
  MANUAL_STEPPER STEPPER=w_motor GCODE_AXIS=H

[gcode_macro START_PRINT]
gcode:
  REGISTER_CMYKW_AXES
  # Add the rest of your normal print-start sequence here.

# OrcaSlicer still emits Tn as filament slot markers. The real channel motor
# positions are A/B/C/D/H, so these macros only prevent unknown-command errors.
[gcode_macro T0]
gcode:
  G4 P0

[gcode_macro T1]
gcode:
  G4 P0

[gcode_macro T2]
gcode:
  G4 P0

[gcode_macro T3]
gcode:
  G4 P0

[gcode_macro T4]
gcode:
  G4 P0

[gcode_macro T5]
gcode:
  G4 P0

[gcode_macro T6]
gcode:
  G4 P0

[gcode_macro T7]
gcode:
  G4 P0

[gcode_macro T8]
gcode:
  G4 P0

[gcode_macro T9]
gcode:
  G4 P0

[gcode_macro T10]
gcode:
  G4 P0

[gcode_macro T11]
gcode:
  G4 P0

[gcode_macro T12]
gcode:
  G4 P0

[gcode_macro T13]
gcode:
  G4 P0

[gcode_macro T14]
gcode:
  G4 P0

[gcode_macro T15]
gcode:
  G4 P0

[gcode_macro T16]
gcode:
  G4 P0

[gcode_macro T17]
gcode:
  G4 P0

[gcode_macro T18]
gcode:
  G4 P0

[gcode_macro T19]
gcode:
  G4 P0
